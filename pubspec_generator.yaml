# FlutterGen configuration file
flutter_gen:
  output: lib/gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

  # Optional
  integrations:
    flutter_svg: true
    flare_flutter: false
    rive: false
    lottie: false

  assets:
    enabled: true
    package_parameter_enabled: false
    style: snake-case  # Optional (default: snake-case)
    outputs:
      # Optional (default: Assets)
      class_name: Assets
      # Optional (default: assets.gen.dart)
      filename: assets.gen.dart

  fonts:
    enabled: false

  colors:
    enabled: false

